spring.application.name=auth-service-api

server.port=9092



#database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/cpd_hotel_auth?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=1234
#java wants to connect the mysql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver



#In system,we have to tell use the mysql version
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.generate-ddl=true
# when we do changes in database it will update in the code also
spring.jpa.hibernate.ddl-auto=update


